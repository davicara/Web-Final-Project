<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/site.css">
    <title>Davide Carraro | Web Tech | Cert 4 Prog</title>
    <script src="../assets/js/contact.js"></script>

</head>

<body class="min-h-screen bg-[url('../img/contactPage1.jpg')] bg-cover bg-center bg-no-repeat bg-fixed p-2 ">

    <header class="rounded rounded-b-none bg-gradient-to-r from-[#245EDC] to-[#1941A5] sticky top-0 
        flex flex-row justify-between p-6 mx-auto md:flex-row gap-2 bg-gray-800 text-gray-200 
        shadow-[0_0_8px_rgba(0,0,0,0.65)]">

        <a class="flex items-center title-font gap-2">
            <img class="h-6" src="https://placehold.co/64?text=logo" alt="Logo">
            <h1 class="text-sm font-bold">Certificate IV in IT Web Tech Portfolio</h1>
        </a>

        <nav class="flex text-base items-center">
            <ul class="flex gap-0 md:gap-4 text-sm md:flex-row flex-col">
                <li><a href="./index.html">Home</a></li>
                <li><a href="./resume.html">Resume</a></li>
                <li><a href="./ninja.html">Ninja API</a></li>
                <li><a href="./music.html">Music App</a></li>
            </ul>
        </nav>
    </header>

    <main class="items-center bg-[#cee0f5]/50 w-full h-full flex flex-col gap-10 p-4 shadow-[0_0_8px_rgba(0,0,0,0.65)]">
        <article class="bg-[#cee0f5]/70 w-full rounded border-gray-200 p-2 w-[300px]">
            <section
                class=" bg-gradient-to-b from-[#EAF4FF] to-[#DCE8F6] shadow-[4px_4px_8px_rgba(0,0,0,0.65)] border-4 border-t-0 border-b-[20px] border-[#cee0f5] rounded-sm">
                <header
                    class="-mr-[2px] bg-[#cee0f5] text-gray-200 mb-0 justify-between items-start gap-2 flex flex-row rounded-t-sm border-gray-200">
                    <a class="items-center gap-2 flex flex-row">
                        <img src="../assets/img/windows_logo.png" alt="Windows" class="h-5">
                        <h2 class="text-xl font-bold text-gray-500">Contact Us</h2>
                    </a>

                    <a>
                        <img src="../assets/img/close_button.png" alt="Close" class="h-4">
                    </a>
                </header>
                <section class="flex flex-col gap-1 p-2">

                    <form id="submit">

                        <fieldset class="flex flex-col">

                            <label for="name_box">Name</label>
                            <input class="p-1 border-[1px] border-gray-250 rounded" type="text" id="name_box">
                            <label id="error_name" class="invisible text-red-600 text-sm font-light">Name is required</label>

                            <label class="mt-1" for="email_box">Email</label>
                            <input class="border-[1px] border-gray-250 rounded" type="text" id="email_box">
                            <label id="error_email" class="invisible text-red-600 text-sm font-light">Valid email is required</label>

                            <label class="mt-1" for="message_box">Message</label>
                            <input class=" p-1 border-[1px] border-gray-250 rounded h-[100px] align-top" type="text"
                                id="message_box">
                            <label id="error_message" class="invisible text-red-600 text-sm font-light">Message cannot be empty</label>

                            <button class="p-1 mt-1 bg-blue-500 text-white w-full rounded font-bold mx-auto" id="send_button"
                                type="submit"> Send </button>

                        </fieldset>

                    </form>

                </section>
            </section>
        </article>
    </main>
    <footer class=" rel text-white bg-gradient-to-r from-[#245EDC] to-[#1941A5] body-font
    w-full flex flex-col items-start justify-between p-6 shadow-[0_0_8px_rgba(0,0,0,0.65)]
            mx-auto md:flex-row gap-2 rounded rounded-t-none">
        <section class="flex items-center mb-4 title-font md:mb-0 gap-2
                  hover:text-white transition duration-500 ease-in-out">
            <h3 class="text-sm">Certificate IV in IT Web Tech Portfolio</h3>
            <img src="https://placehold.co/64?text=logo" alt="Logo" class="h-6">
        </section>
        <section class="flex flex-wrap text-sm pl-6 ml-6 text-base
                border-l border-gray-400 grow ">
            <p class="m-auto">© Copyright 2026 Davide Carraro. All rights reserved.</p>
        </section>
        <ul class="flex flex-wrap text-sm pl-6 ml-6 text-base border-l border-gray-400
                md:mr-auto gap-2">
            <li><a href="./contact.html" class="border-b border-gray-400 hover:border-gray-200 hover:text-white
             transition duration-500 ease-in-out">Contact Us</a></li>
            <li><a href="./about.html" class="border-b border-gray-400 hover:border-gray-200 hover:text-white
             transition duration-500 ease-in-out">About Us</a></li>
        </ul>
    </footer>
</body>

</html>
